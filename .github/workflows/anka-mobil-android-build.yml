name: Anka Mobil Android Build

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project ID under projects/'
        required: true
        type: string
      build_type:
        description: 'apk or aab'
        required: true
        type: choice
        options:
          - apk
          - aab

concurrency:
  group: anka-mobil-${{ inputs.project_id }}-${{ inputs.build_type }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    name: Build ${{ inputs.project_id }} (${{ inputs.build_type }})
    env:
      GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dkotlin.incremental=false'
      EXPO_NO_TELEMETRY: '1'
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ inputs.project_id }}-${{ hashFiles(format('projects/{0}/package-lock.json', inputs.project_id), format('projects/{0}/package.json', inputs.project_id)) }}
          restore-keys: |
            npm-${{ runner.os }}-${{ inputs.project_id }}-
            npm-${{ runner.os }}-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        working-directory: projects/${{ inputs.project_id }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Expo prebuild (android)
        working-directory: projects/${{ inputs.project_id }}
        run: npx expo prebuild --platform android --non-interactive

      - name: Patch rootProject.ext.kotlinVersion (Expo SDK 52 + RN 0.76 Kotlin compat fix)
        working-directory: projects/${{ inputs.project_id }}/android
        run: |
          set -eu
          echo '--- android/build.gradle before patch ---'
          grep -n 'kotlinVersion\|kotlin_version\|KOTLIN' build.gradle || true

          python3 - <<'PYEOF'
          import re

          target = "1.9.24"

          with open('build.gradle', 'r') as f:
              content = f.read()
          original_bg = content

          # Expo/RN şablonu: kotlinVersion = findProperty('android.kotlinVersion') ?: '1.9.25'
          content = re.sub(
              r"(findProperty\(\s*['\"]android\.kotlinVersion['\"]\s*\)\s*\?:\s*)['\"]1\.9\.25['\"]",
              rf"\g<1>'{target}'",
              content,
          )
          # Düz atama: kotlinVersion = "1.9.25"
          content = re.sub(
              r'(kotlinVersion\s*=\s*)["\']1\.9\.25["\']',
              rf'\g<1>"{target}"',
              content,
          )
          content = re.sub(
              r'(kotlin_version\s*=\s*)["\']1\.9\.25["\']',
              rf'\g<1>"{target}"',
              content,
          )

          with open('build.gradle', 'w') as f:
              f.write(content)
          print(f'build.gradle changed: {content != original_bg}')

          # gradle.properties: findProperty bunu okur — en güvenilir pin
          props_path = 'gradle.properties'
          try:
              with open(props_path, 'r') as f:
                  props = f.read()
          except FileNotFoundError:
              props = ''
          original_gp = props
          key = 'android.kotlinVersion'
          line = f'{key}={target}'
          if re.search(rf'^{re.escape(key)}=', props, flags=re.MULTILINE):
              props = re.sub(
                  rf'^{re.escape(key)}=.*$',
                  line,
                  props,
                  flags=re.MULTILINE,
              )
          else:
              props = props.rstrip() + '\n' + line + '\n'
          with open(props_path, 'w') as f:
              f.write(props)
          print(f'gradle.properties changed: {props != original_gp}')
          print('--- gradle.properties (kotlin) ---')
          for ln in props.splitlines():
              if 'kotlin' in ln.lower():
                  print(ln)

          if content == original_bg and props == original_gp:
              print('WARNING: hiçbir değişiklik yapılamadı — build.gradle kotlin satırları:')
              for i, ln in enumerate(content.splitlines(), 1):
                  if 'kotlin' in ln.lower():
                      print(f'  {i}: {ln}')
          PYEOF

          echo '--- android/build.gradle after patch ---'
          grep -n 'kotlinVersion\|kotlin_version\|KOTLIN' build.gradle || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-cleanup: true

      - name: Build APK (debug)
        if: ${{ inputs.build_type == 'apk' }}
        working-directory: projects/${{ inputs.project_id }}/android
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Build AAB (debug)
        if: ${{ inputs.build_type == 'aab' }}
        working-directory: projects/${{ inputs.project_id }}/android
        run: ./gradlew bundleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        if: ${{ inputs.build_type == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_id }}-apk-${{ github.run_number }}
          path: projects/${{ inputs.project_id }}/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload AAB artifact
        if: ${{ inputs.build_type == 'aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_id }}-aab-${{ github.run_number }}
          path: projects/${{ inputs.project_id }}/android/app/build/outputs/bundle/debug/app-debug.aab
          if-no-files-found: error
          retention-days: 90

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_id }}-${{ inputs.build_type }}-logs-${{ github.run_number }}
          path: |
            projects/${{ inputs.project_id }}/android/app/build/reports/**
            projects/${{ inputs.project_id }}/android/build/reports/**
          if-no-files-found: ignore
          retention-days: 14