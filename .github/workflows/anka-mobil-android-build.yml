name: Anka Mobil Android Build

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project ID under projects/'
        required: true
        type: string
      build_type:
        description: 'apk or aab'
        required: true
        type: choice
        options:
          - apk
          - aab

jobs:
  android:
    runs-on: ubuntu-latest
    name: Build ${{ inputs.project_id }} (${{ inputs.build_type }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/${{ inputs.project_id }}/package-lock.json

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        working-directory: projects/${{ inputs.project_id }}
        run: npm install

      - name: Expo prebuild (android)
        working-directory: projects/${{ inputs.project_id }}
        run: npx expo prebuild --platform android --non-interactive

      - name: Build APK (debug)
        if: ${{ inputs.build_type == 'apk' }}
        working-directory: projects/${{ inputs.project_id }}/android
        run: ./gradlew assembleDebug

      - name: Build AAB (debug)
        if: ${{ inputs.build_type == 'aab' }}
        working-directory: projects/${{ inputs.project_id }}/android
        run: ./gradlew bundleDebug

      - name: Upload APK artifact
        if: ${{ inputs.build_type == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_id }}-apk
          path: projects/${{ inputs.project_id }}/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB artifact
        if: ${{ inputs.build_type == 'aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project_id }}-aab
          path: projects/${{ inputs.project_id }}/android/app/build/outputs/bundle/debug/app-debug.aab